    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Space+Grotesk:wght@500;600&display=swap');
        
        :root {
            --tw-color-primary: #22d3ee;
        }
        
        * { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        
        .table-container {
            overflow-x: auto;
            padding-bottom: 2rem;
            /* Hide scrollbar for clean UI but keep functionality */
            scrollbar-width: none; 
        }
        .table-container::-webkit-scrollbar { display: none; }

        .periodic-grid {
            display: grid;
            /* 1 column for period numbers + 18 element columns */
            grid-template-columns: 30px repeat(18, 62px);
            grid-template-rows: 30px repeat(10, 92px); /* +1 row for group numbers */
            gap: 5px;
            width: max-content;
            margin: 0 auto;
            font-family: 'Inter', system-ui, sans-serif;
        }
        
        .axis-label {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            color: #52525b; /* zinc-600 */
        }

        .element {
            padding: 6px;
            border-radius: 14px;
            box-shadow: 0 8px 16px -4px rgb(0 0 0 / 0.25);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            backdrop-filter: blur(10px);
        }
        
        .element:hover {
            transform: scale(1.12) rotate(1deg);
            box-shadow: 0 20px 40px -10px rgb(34 211 238 / 0.4);
            z-index: 20;
        }
        
        .element .number { font-size: 15px; font-weight: 600; opacity: 0.85; }
        .element .symbol { font-size: 26px; font-weight: 700; line-height: 1; text-align: center; font-family: 'Space Grotesk', sans-serif; }
        .element .mass { font-size: 9px; text-align: right; opacity: 0.75; font-weight: 500; }
        
        .name-hover {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(15, 23, 42, 0.95);
            color: white;
            font-size: 13px;
            font-weight: 600;
            padding: 4px 14px;
            border-radius: 9999px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            box-shadow: 0 10px 20px -5px rgb(0 0 0 / 0.4);
        }
        
        .element:hover .name-hover { opacity: 1; }
        
        .modal { animation: modalPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
        
        @keyframes modalPop {
            0% { transform: scale(0.9) translateY(20px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }
    </style>
</head>

        function getElementColor(cat) {
            return cat === "nonmetal" ? "bg-red-500" : 
                   cat === "noble" ? "bg-indigo-500" : 
                   cat === "alkali" ? "bg-orange-500" : 
                   cat === "alkaline" ? "bg-amber-500" : 
                   cat === "transition" ? "bg-blue-600" : 
                   cat === "lanthanide" ? "bg-violet-500" : 
                   cat === "actinide" ? "bg-pink-500" : 
                   cat === "halogen" ? "bg-purple-500" :
                   cat === "metalloid" ? "bg-teal-500" :
                   "bg-green-500";
        }

        function renderTable() {
            const grid = document.getElementById('periodic-grid');
            grid.innerHTML = '';

            // Add Group Numbers (1-18) at the top
            for(let c = 1; c <= 18; c++) {
                const groupLabel = document.createElement('div');
                groupLabel.className = 'axis-label';
                // Grid layout is offset by 1 row and 1 col due to labels
                groupLabel.style.gridRow = 1;
                groupLabel.style.gridColumn = c + 1;
                groupLabel.textContent = c;
                grid.appendChild(groupLabel);
            }

            // Add Period Numbers (1-7) down the side
            for(let r = 1; r <= 7; r++) {
                const periodLabel = document.createElement('div');
                periodLabel.className = 'axis-label';
                periodLabel.style.gridRow = r + 1;
                periodLabel.style.gridColumn = 1;
                periodLabel.textContent = r;
                grid.appendChild(periodLabel);
            }

            elements.forEach(el => {
                const div = document.createElement('div');
                div.className = `element ${getElementColor(el.cat)} text-white`;
                
                // Offset by +1 because row 1 is Groups and col 1 is Periods
                div.style.gridRow = (el.row || 1) + 1;
                div.style.gridColumn = (el.col || 1) + 1;

                div.innerHTML = `
                    <div class="flex justify-between">
                        <div class="number">${el.num}</div>
                        <div class="mass">${el.mass}</div>
                    </div>
                    <div class="symbol text-center">${el.sym}</div>
                    <div class="name-hover">${el.name}</div>
                `;

                div.addEventListener('click', () => showModal(el));
                grid.appendChild(div);
            });
        }

        function showModal(el) {
            document.getElementById('modal-symbol-box').innerHTML = `<span class="drop-shadow">${el.sym}</span>`;
            document.getElementById('modal-symbol-box').className = `w-28 h-28 flex items-center justify-center text-7xl font-bold rounded-3xl shadow-inner ${getElementColor(el.cat)} text-white`;

            document.getElementById('modal-number').textContent = el.num;
            document.getElementById('modal-name').textContent = el.name;
            document.getElementById('modal-mass').innerHTML = `Atomic mass: <span class="font-semibold">${el.mass}</span> u`;

            const badge = document.getElementById('modal-category-badge');
            badge.textContent = el.cat.toUpperCase();
            badge.className = `mt-3 inline-block text-xs px-5 py-1 rounded-3xl font-medium ${getElementColor(el.cat)} text-white`;

            document.getElementById('basic-info').innerHTML = `
                <div><span class="text-zinc-400">Symbol:</span> <span class="font-medium">${el.sym}</span></div>
                <div><span class="text-zinc-400">Atomic Number:</span> <span class="font-medium">${el.num}</span></div>
                <div class="pt-2 text-xs">${el.basic || 'Basic chemical properties vary by group.'}</div>
            `;

            document.getElementById('modal-history').innerHTML = el.history;
            document.getElementById('modal-scientist').innerHTML = el.disc;
            document.getElementById('modal-year').innerHTML = `Year: ${el.year}`;
            document.getElementById('modal-discovery-desc').innerHTML = el.disc_desc;

            document.getElementById('wiki-link').href = `https://en.wikipedia.org/wiki/${el.name}`;

            document.getElementById('modal-backdrop').classList.remove('hidden');
            document.getElementById('modal-backdrop').classList.add('flex');
        }

        function hideModal() {
            const backdrop = document.getElementById('modal-backdrop');
            backdrop.classList.add('hidden');
            backdrop.classList.remove('flex');
        }

        window.onload = () => {
            renderTable();
        };
    </script>
